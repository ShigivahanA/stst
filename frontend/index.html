<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function() {
      // Check if we are on a touch device but browser is spoofing a desktop User Agent (Request Desktop Site)
      var isTouchDevice = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
      var isDesktopUA = /Macintosh|Windows|Linux x86_64|X11/.test(navigator.userAgent) && !/Mobi|Android|iPhone|iPad|iPod/.test(navigator.userAgent);
      
      if (isTouchDevice && isDesktopUA) {
        var viewport = document.getElementById('viewport');
        if (viewport) {
          viewport.setAttribute('content', 'width=1200, shrink-to-fit=no');
        }
        document.documentElement.classList.add('mobile-desktop-mode');
      }
    })();
  </script>
  <title>Stat Surgicals</title>
  <meta name="description" content="Your one-stop shop for all surgical needs" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Unbounded:wght@300..900&display=swap"
    rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
